
author: "Infiter Tathfif"
description: "University of Maryland"
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Layout

show_excerpts: false       # show article excerpts on the home page
show_frame: true           # adds a gray frame to the site
show_sidebar: false      # show a sidebar instead of the usual header
minimal: true            # use a dark header

# Menu

navigation:                # accepts {file, title, url, icon, sidebaricon}
  - {url: "https://infitertathfif.github.io", title: "Home"}
  - {file: "infiter.pdf", title: "CV"}
  - {file: "research.md", title: "Research"}
  - {file: "Publications.md", title: "Publications"}
  - {file: "blog.md", title: "Blog"}

external:                  # shows a footer with social links - for available icons see fontawesome.com/icons
  - {title: Mail, icon: envelope, url: "mailto:infiter@umd.edu"}
  - {title: Github, icon: github, url: "https://github.com/infitertathfif"}
  - {title: Subscribe, icon: rss, url: "/feed.xml"}

comments:
#  disqus_shortname: ""    # see https://disqus.com/
#  isso_domain: ""         # see https://posativ.org/isso/

plugins:
 - jekyll-feed
